name: alalamia
description: "A new Flutter project."
publish_to: 'none' 
version: 1.0.0+1

environment:
  sdk: ^3.9.2
dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  easy_localization: ^3.0.8
  flutter_screenutil: ^5.9.3
  skeletonizer: ^2.1.0+1
  flutter_svg: ^2.2.1
  cached_network_image: ^3.4.1
  dio: ^5.9.0
  hive_flutter: ^1.1.0
  equatable: ^2.0.7
  dartz: ^0.10.1
  get_it: ^8.2.0
  pin_code_fields: ^8.0.1
  requests_inspector: ^5.1.1
  internet_connection_checker: ^3.0.1
  flutter_local_notifications: ^19.4.2
  firebase_messaging: ^16.0.2
  firebase_core: ^4.1.1
  flutter_bloc: ^9.1.1
  restart_app: ^1.3.2
  flutter_secure_storage: ^9.2.4
  image_picker: ^1.2.0
  modal_progress_hud_nsn: ^0.5.1
  url_launcher: ^6.3.2
  pretty_dio_logger: ^1.4.0
  google_fonts: ^6.3.2
  animated_bottom_navigation_bar: ^1.4.0
  animated_notch_bottom_bar: ^1.0.3
  dotted_border: ^3.1.0
  injectable: ^2.7.1+2
  smooth_page_indicator: 2.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.10.4
  injectable_generator: ^2.11.1

flutter:
  uses-material-design: true
  assets:
    - assets/
    - assets/translations/
    - assets/svgs/
    - assets/images/
    - assets/fonts/

flutter_assets:
  assets_path: assets/
  output_path: lib/generated/
  filename: app_assets.dart
  ignore_comments: true
  field_prefix: 
  classname: AppAssets

  
  fonts:
    - family: Cairo
      fonts:
        - asset: assets/fonts/Cairo-Regular.ttf
        - asset: assets/fonts/Cairo-Bold.ttf
          weight: 700
        - asset: assets/fonts/Cairo-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Cairo-Medium.ttf
          weight: 500
        - asset: assets/fonts/Cairo-Light.ttf
          weight: 300
        - asset: assets/fonts/Cairo-ExtraLight.ttf
          weight: 200
        - asset: assets/fonts/Cairo-Black.ttf
          weight: 900    

